<!DOCTYPE html>
<html lang="en" data-theme="auto">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speak Aloud</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color)">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <span class="title">Read Aloud</span>
      </div>
      <div class="header-actions">
        <button id="btnCopy" class="icon-btn" title="Copy Text" aria-label="Copy extracted text" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
        <button id="btnDownload" class="icon-btn" title="Download Text" aria-label="Download as .txt" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
        <button id="btnTheme" class="icon-btn" title="Toggle Theme" aria-label="Toggle dark mode">
          <svg id="iconTheme" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button id="btnSettings" class="icon-btn" title="Settings" aria-label="Open settings">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Resume Prompt -->
    <div id="resumePrompt" class="resume-prompt hidden">
      <span>Resume from where you left off?</span>
      <div class="resume-actions">
        <button id="btnResumeYes" class="text-btn">Resume</button>
        <button id="btnResumeNo" class="text-btn secondary">Start Over</button>
      </div>
    </div>

    <!-- Main Content Area -->
    <main class="content-view" id="contentView">
      <div id="textArea" class="text-content">
        <p class="placeholder-text">Select text to read or click Play to read the page.</p>
      </div>
    </main>

    <!-- Settings Panel (Overlay) -->
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header">
        <h3>Settings</h3>
        <button id="btnCloseSettings" class="icon-btn sm" aria-label="Close settings">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="setting-item">
        <label>Voice</label>
        <select id="voiceSelect" class="form-select"></select>
        <div id="voiceError" class="voice-error hidden">No voices available. Please check your system TTS settings.</div>
      </div>

      <div class="setting-item">
        <label>Highlight Mode</label>
        <select id="highlightModeSelect" class="form-select">
          <option value="sentence">Sentence</option>
          <option value="word">Word</option>
        </select>
      </div>

      <div class="setting-item">
        <label>Speed: <span id="rateValue">1.0x</span></label>
        <input type="range" id="rateRange" min="0.5" max="3.0" step="0.1" value="1.0">
      </div>

      <div class="setting-item">
        <label>Pitch: <span id="pitchValue">1.0</span></label>
        <input type="range" id="pitchRange" min="0.5" max="2.0" step="0.1" value="1.0">
      </div>

      <div class="setting-item">
        <label>Volume: <span id="volumeValue">1.0</span></label>
        <input type="range" id="volumeRange" min="0" max="1.0" step="0.1" value="1.0">
      </div>

      <div class="setting-item checkbox-item">
        <label class="checkbox-label">
          <input type="checkbox" id="chkAutoScroll">
          <span>Auto-scroll to current sentence</span>
        </label>
      </div>

      <div class="setting-item checkbox-item">
        <label class="checkbox-label">
          <input type="checkbox" id="chkMiniPlayer">
          <span>Show in-page mini-player</span>
        </label>
      </div>

      <div class="settings-footer">
        <button id="btnTestVoice" class="text-btn">Test Voice</button>
        <button id="btnReset" class="text-btn">Reset Defaults</button>
      </div>
    </div>

    <!-- Player Controls -->
    <footer class="player-controls">
      <!-- Progress Bar -->
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- Buttons -->
      <div class="control-buttons">
        <button id="btnPrevPara" class="control-btn sm" title="Previous Paragraph" aria-label="Previous paragraph" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="19" x2="5" y2="5"></line>
            <line x1="9" y1="19" x2="9" y2="5"></line>
          </svg>
        </button>

        <button id="btnPrev" class="control-btn sm" title="Previous Sentence" aria-label="Previous sentence" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="19" x2="5" y2="5"></line>
          </svg>
        </button>

        <button id="btnStop" class="control-btn sm" title="Stop" aria-label="Stop playback" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          </svg>
        </button>

        <button id="btnPlay" class="control-btn lg play-btn" title="Play" aria-label="Play or pause" disabled>
          <!-- Play Icon -->
          <svg id="iconPlay" viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2"
            fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <!-- Pause Icon (Hidden by default) -->
          <svg id="iconPause" class="hidden" viewBox="0 0 24 24" width="32" height="32" stroke="currentColor"
            stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        </button>

        <button id="btnNext" class="control-btn sm" title="Next Sentence" aria-label="Next sentence" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        </button>

        <button id="btnNextPara" class="control-btn sm" title="Next Paragraph" aria-label="Next paragraph" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
            <line x1="15" y1="5" x2="15" y2="19"></line>
          </svg>
        </button>
      </div>
      <div class="footer-bottom">
        <a href="https://github.com/realsanjeev/read-aloud-extension/issues" id="linkReportIssue" class="report-link">
          <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
            </path>
          </svg>
          Report an Issue
        </a>
      </div>
    </footer>
  </div>
  <script type="module" src="popup.js"></script>
</body>

</html>
