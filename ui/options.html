<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <title>Read Aloud - Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      background: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .options-container {
      width: 100%;
      max-width: 600px;
      background: var(--surface-color);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 12px var(--border-color);
      height: fit-content;
    }
    .options-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
    }
    .options-header h1 {
      margin: 0;
      font-size: 1.5rem;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .setting-item {
      margin-bottom: 20px;
    }
    .settings-footer {
      margin-top: 30px;
      display: flex;
      gap: 10px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }
  </style>
</head>
<body>
  <div class="options-container">
    <div class="options-header">
      <h1>
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        Read Aloud Settings
      </h1>
      <button id="btnTheme" class="icon-btn" title="Toggle Theme" aria-label="Toggle dark mode">
        <svg id="iconTheme" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        </svg>
      </button>
    </div>

    <div class="setting-item">
      <label>Voice</label>
      <select id="voiceSelect" class="form-select"></select>
      <div id="voiceError" class="voice-error hidden">No voices available. Please check your system TTS settings.</div>
    </div>

    <div class="setting-item">
      <label>Highlight Mode</label>
      <select id="highlightModeSelect" class="form-select">
        <option value="sentence">Sentence</option>
        <option value="word">Word</option>
      </select>
    </div>

    <div class="setting-item">
      <label>Speed: <span id="rateValue">1.0x</span></label>
      <input type="range" id="rateRange" min="0.5" max="3.0" step="0.1" value="1.0">
      <div class="preset-buttons" id="ratePresets">
        <button class="preset-btn" data-rate="0.5">0.5x</button>
        <button class="preset-btn" data-rate="0.75">0.75x</button>
        <button class="preset-btn active" data-rate="1.0">1.0x</button>
        <button class="preset-btn" data-rate="1.25">1.25x</button>
        <button class="preset-btn" data-rate="1.5">1.5x</button>
        <button class="preset-btn" data-rate="2.0">2.0x</button>
      </div>
    </div>

    <div class="setting-item">
      <label>Pitch: <span id="pitchValue">1.0</span></label>
      <input type="range" id="pitchRange" min="0.5" max="2.0" step="0.1" value="1.0">
    </div>

    <div class="setting-item">
      <label>Volume: <span id="volumeValue">1.0</span></label>
      <input type="range" id="volumeRange" min="0" max="1.0" step="0.1" value="1.0">
    </div>

    <div class="setting-item checkbox-item">
      <label class="checkbox-label">
        <input type="checkbox" id="chkAutoScroll">
        <span>Auto-scroll to current sentence</span>
      </label>
    </div>

    <div class="setting-item checkbox-item">
      <label class="checkbox-label">
        <input type="checkbox" id="chkMiniPlayer">
        <span>Show in-page mini-player</span>
      </label>
    </div>

    <div class="settings-footer">
      <button id="btnTestVoice" class="text-btn">Test Voice</button>
      <button id="btnReset" class="text-btn secondary">Reset Defaults</button>
    </div>
    <div class="options-credit" style="margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 16px; display: flex; justify-content: space-between; align-items: center;">
      <a href="https://bhandarisanjeev.com.np" target="_blank" title="Visit Developer Portfolio" style="display: flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.2s;">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        Developed by @realsanjeev
      </a>
      <a href="https://github.com/realsanjeev/read-aloud-extension/issues" target="_blank" style="display: flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.2s;">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
        </svg>
        Report an Issue
      </a>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
